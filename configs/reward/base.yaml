# @package _global_
reward:
  extraction_profile: default
  is_answer_tag: false
  think_start_token: <think>
  think_end_token: </think>
  answer_start_token: <answer>
  answer_end_token: </answer>
  eos_token: <|im_end|>
  match:
    incorrect_penalty: 0.0
  code_execution:
    timeout: 2
    wrong_output_penalty: 0.0
    non_executable_penalty: 0.0
  rouge:
    type: l
  equation:
    target_column_name: target
    numbers_column_name: numbers
  retrieval:
    gpu_memory_utilization: 0.1
    dim: 1024
    hit:
      top_k: 250
      shaping_weight: 1.0
      rank_margin: 0
      stages:
        - k: 20
          bonus: 0.10
          drop: 0.10
        - k: 10
          bonus: 0.30
          drop: 0.30
        - k: 5
          bonus: 0.50
          drop: 0.50
    ndcg:
      top_k: null
      reward_mode: relative
      top_ks: [1, 3, 5, 10]
      alpha: 0.5
      weighting_mode: large_k
      epsilon: 1.0e-8
  single_kv:
    json_parse_weight: 0.2
  multi_kv:
    json_parse_weight: 0.2
  grounding_bbox:
    category_token: ground
    format_reward: 0.1
    schema_reward: 0.1
    page_reward: 0.2
    iou_weight: 0.5
    iou_05_threshold: 0.5
    iou_05_bonus: 0.3
    iou_07_threshold: 0.7
    iou_07_bonus: 0.2
    center_in_gt_bonus: 0.1
    large_box_area_threshold: 0.25
    large_box_penalty: -0.2
    hard_negative_iou_threshold: 0.5
    hard_negative_overlap_penalty: -0.3
    positive_duplicate_iou_threshold: 0.95
    schema_keys:
      field_path: [field_path]
      value_index: [value_index]
      grounding_status: [grounding_status]
      prediction_occurrences: [evidence_occurrences, positive_occurrences, occurrences]
      label_occurrences: [positive_occurrences, evidence_occurrences, occurrences]
      hard_negative_evidence: [hard_negative_evidence]
      fragments: [fragments]
      page: [page]
      bbox: [bbox]
      envelope_bbox: [envelope_bbox, bbox]
      coord_system: [coord_system]
    status_values:
      found: [found]
      not_found: [not_found, missing, absent]
    min_reward: 0.0
    max_reward: 1.0
  grounding_selection:
    category_token: grounding
    format_reward: 0.1
    schema_reward: 0.1
    exact_match_reward: 0.6
    partial_match_weight: 0.6
    over_selection_penalty: -0.2
    wrong_selection_penalty: -0.3
    min_reward: 0.0
    max_reward: 1.0
    schema_keys:
      items: [grounding]
      target_id: [target_id]
      selected_ids: [selected_ids, selected_candidate_ids]
  weight:
    think_format: 0.0
    answer_format: 0.0
    match: 2.0
    code_execution: 0.0
    rouge: 0.0
    equation: 0.0
    retrieval_hit: 0.0
    retrieval_ndcg: 0.0
    single_kv: 0.0
    multi_kv: 0.0
    grounding_bbox: 0.0
    grounding_selection: 0.0