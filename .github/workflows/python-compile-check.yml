name: Python Compile Check

on:
  pull_request:
  push:
    branches:
      - "**"

jobs:
  python-compile-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python files
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall main.py src

